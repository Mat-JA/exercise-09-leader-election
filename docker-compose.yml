services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nodes_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  node-1:
    build: .
    ports:
      - "8081:8080"
    environment:
      NODE_ID: "1"
      PEERS: "http://node-2:8080,http://node-3:8080"
      DATABASE_URL: "postgresql://postgres:postgres@db:5432/nodes_db"
    depends_on:
      db:
        condition: service_healthy

  node-2:
    build: .
    ports:
      - "8082:8080"
    environment:
      NODE_ID: "2"
      PEERS: "http://node-1:8080,http://node-3:8080"
      DATABASE_URL: "postgresql://postgres:postgres@db:5432/nodes_db"
    depends_on:
      db:
        condition: service_healthy

  node-3:
    build: .
    ports:
      - "8083:8080"
    environment:
      NODE_ID: "3"
      PEERS: "http://node-1:8080,http://node-2:8080"
      DATABASE_URL: "postgresql://postgres:postgres@db:5432/nodes_db"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata: